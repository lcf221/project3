<!DOCTYPE html>
<html lang="en" class="tk-mokoko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#98cfe9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Line Laughs" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="apple-touch-icon" href="assets/game_icons/fishbowl.jpg" />
    <title>Choose a game — Line Laughs</title>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://p.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/mdc7iyl.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <section id="games" class="game-screen screen active" aria-label="Choose a game">
        <h2 class="games-heading">Line Laughs</h2>
        <div class="games-grid" role="group" aria-label="Games">
          <a href="fishbowl.html" class="game-tile" data-game="fishbowl" aria-label="Fishbowl">
            <img class="game-tile__icon" src="assets/game_icons/fishbowl.jpg" alt="" width="512" height="512" decoding="async" />
          </a>
          <a href="imposter.html" class="game-tile" data-game="imposter" aria-label="Imposter">
            <img class="game-tile__icon" src="assets/game_icons/imposter.jpg" alt="" width="512" height="512" decoding="async" />
          </a>
          <a href="trivia.html" class="game-tile" data-game="trivia" aria-label="Smarty Party">
            <img class="game-tile__icon" src="assets/game_icons/party.jpg" alt="" width="512" height="512" decoding="async" />
          </a>
          <a href="telestrations.html" class="game-tile" data-game="telestrations" aria-label="Silly Sketch">
            <img class="game-tile__icon" src="assets/game_icons/sketch.jpg" alt="" width="512" height="512" decoding="async" />
          </a>
          <a href="conversation.html" class="game-tile" data-game="conversation" aria-label="Spill the Beans">
            <img class="game-tile__icon" src="assets/game_icons/beans.jpg" alt="" width="512" height="512" decoding="async" />
          </a>
          <a href="wild-words.html" class="game-tile" data-game="wild-words" aria-label="Wild Words">
            <img class="game-tile__icon" src="assets/game_icons/words.jpg" alt="" width="512" height="512" decoding="async" />
          </a>
        </div>
        <div class="coaster-wrap coaster-root" aria-hidden="true" data-coaster-mode="timer">
          <svg class="coaster-svg" viewBox="0 0 400 112" xmlns="http://www.w3.org/2000/svg">
            <g class="coaster-supports" fill="none" stroke-linecap="round"></g>
            <path
              class="coaster-rail-path"
              fill="none"
              stroke-width="8"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M 6 99 C 28 99 38 76 55 70 C 72 64 88 92 108 100 C 128 108 145 78 168 54 C 192 32 208 44 228 78 C 246 100 260 92 278 50 C 298 18 318 16 342 52 C 364 82 382 88 395 90"
            />
            <g class="coaster-car" transform="translate(6,99)">
              <g class="coaster-car-body">
                <rect x="-11" y="-12" width="22" height="11" rx="2" fill="currentColor" />
                <circle cx="-4.5" cy="2" r="3.25" fill="currentColor" />
                <circle cx="5.5" cy="2" r="3.25" fill="currentColor" />
              </g>
            </g>
          </svg>
        </div>
      </section>
    </div>

    <nav class="bottom-nav visible" aria-label="Main">
      <a href="index.html" class="bottom-nav-icon" aria-label="Line Laughs home">
        <img src="assets/navigation/Home.png" alt="" width="56" height="56" decoding="async" />
      </a>
      <a href="choose-game.html" class="bottom-nav-icon" aria-label="Pick a game">
        <img src="assets/navigation/new%20game.png" alt="" width="56" height="56" decoding="async" />
      </a>
      <a href="index.html" class="bottom-nav-icon" aria-label="Start over from Line Laughs">
        <img src="assets/navigation/restart.png" alt="" width="56" height="56" decoding="async" />
      </a>
      <div class="nav-timer-block" role="status" aria-live="polite">
        <img
          class="nav-timer__icon"
          src="assets/navigation/timer.png"
          alt=""
          width="48"
          height="48"
          decoding="async"
          aria-hidden="true"
        />
        <span class="nav-timer" id="nav-timer">—:—</span>
      </div>
    </nav>

    <script src="coaster-picker.js"></script>
    <script src="timer-nav.js"></script>
  </body>
</html>
