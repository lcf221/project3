        var dictCache = new Map();
        var players = [];
        var timerMaxStart = 60;

        function $(id) {
          return document.getElementById(id);
        }

        function showScreen(id) {
          document.querySelectorAll(".fb-screen").forEach(function (el) {
            el.classList.toggle("active", el.id === id);
          });
        }

        function clearTimer() {
          if (timerId) {
            clearInterval(timerId);
            timerId = null;
          }
        }

        function norm(s) {
          return String(s || "")
            .trim()
            .toLowerCase();
        }

        function lettersInOrder(word, seq) {
          word = norm(word);
          seq = norm(seq);
          if (!seq.length) return false;
          var i = 0;
          var j;
          for (j = 0; j < word.length; j++) {
            if (word.charAt(j) === seq.charAt(i)) {
              i++;
              if (i === seq.length) return true;
            }
          }
          return false;
        }

        function pickLetters(skull) {
          var poolB = skull ? BIGRAMS_HARD : BIGRAMS;
          var poolT = skull ? TRIGRAMS_HARD : TRIGRAMS;
          if (Math.random() < 0.42) {
            return poolB[Math.floor(Math.random() * poolB.length)];
          }
          return poolT[Math.floor(Math.random() * poolT.length)];
        }

        function aliveIndices() {
          var a = [];
          var i;
          for (i = 0; i < players.length; i++) {
            if (players[i].lives > 0) a.push(i);
          }
          return a;
        }

        function aliveCount() {
          return aliveIndices().length;
        }

        function secondsForTurn() {
          var base = Math.max(15, timerMaxStart - Math.floor(turnCount * 1.25));
          if (isSkull) {
            base = Math.max(15, Math.floor(base * 0.72));
          }
          return base;
        }

        function rollSkull() {
          return Math.random() < 0.18;
        }

        function validateDictionary(word) {
          return new Promise(function (resolve) {
            var w = norm(word);
            if (w.length < 3) {
              resolve(false);
              return;
            }
            if (!/^[a-z]+$/i.test(w)) {
              resolve(false);
              return;
            }
            if (WW_COMMON.has(w)) {
              resolve(true);
              return;
            }
            if (dictCache.has(w)) {
              resolve(dictCache.get(w));
              return;
            }
            fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + encodeURIComponent(w))
              .then(function (r) {
                var ok = r.ok;
                dictCache.set(w, ok);
                resolve(ok);
              })
              .catch(function () {
                resolve(false);
              });
          });
        }

        function wildWordsCharSrc(i) {
          return "assets/wild_words/Wild_Words%20" + ((i % 9) + 1) + ".svg";
        }

        function buildNameFields(n) {
          var wrap = $("ww-names-fields");
          wrap.innerHTML = "";
          var i;
          for (i = 0; i < n; i++) {
            var row = document.createElement("div");
            row.className = "fb-name-row";
            var combo = document.createElement("div");
            combo.className = "fb-name-field-combo";
            var inp = document.createElement("input");
            inp.id = "ww-name-" + i;
            inp.className = "fb-dark-field fb-name-field";
            inp.type = "text";
            inp.autocomplete = "name";
            inp.placeholder = "TYPE HERE";
            var img = document.createElement("img");
            img.className = "fb-name-fish";
            img.src = wildWordsCharSrc(i);
            img.alt = "";
            img.width = 200;
            img.height = 200;
            combo.appendChild(inp);
            combo.appendChild(img);
            row.appendChild(combo);
            wrap.appendChild(row);
          }
        }

        function readNamesStrings() {
          var fields = document.querySelectorAll("#ww-names-fields input.fb-name-field");
          var list = [];
          var i;
          for (i = 0; i < fields.length; i++) {
            var v = fields[i].value.trim();
            if (!v) {
              alert("Enter every name.");
              return null;
            }
            list.push(v);
          }
          return list;
        }

        function ensureCurrentAlive() {
          var alive = aliveIndices();
          if (alive.length === 0) return;
          if (alive.indexOf(currentIndex) === -1) {
            currentIndex = alive[0];
          }
        }

        function nextAliveAfter(i) {
          var alive = aliveIndices();
          if (alive.length === 0) return -1;
          if (alive.length === 1) return alive[0];
          var pos = alive.indexOf(i);
          if (pos === -1) {
            var j;
            for (j = 0; j < alive.length; j++) {
              if (alive[j] > i) return alive[j];
            }
            return alive[0];
          }
          return alive[(pos + 1) % alive.length];
        }

        function showPassStart() {
          ensureCurrentAlive();
          if (aliveCount() <= 1) {
            showWin();
            return;
          }
          $("ww-pass-start-char").src = wildWordsCharSrc(currentIndex);
          $("ww-pass-start-name").textContent = players[currentIndex].name.toUpperCase();
          var L = players[currentIndex].lives;
          $("ww-pass-start-lives").textContent = String(L) + (L === 1 ? " LIFE" : " LIVES");
          showScreen("ww-pass-start");
        }

        var WRONG_SUBMIT_PENALTY_SEC = 5;

        /** Returns true if the turn ended (timer hit zero). */
        function penalizeWrongSubmit() {
          timeLeft = Math.max(0, timeLeft - WRONG_SUBMIT_PENALTY_SEC);
          $("ww-timer").textContent = String(timeLeft);
          if (timeLeft <= 0) {
            clearTimer();
            onTimeout();
            return true;
          }
          return false;
        }

        function startTurn() {
          clearTimer();
          isSkull = rollSkull();
          letters = pickLetters(isSkull);
          timeLeft = secondsForTurn();
          $("ww-timer").textContent = String(timeLeft);
          $("ww-timer").classList.toggle("ww-bomb--skull", isSkull);
          $("ww-letters").textContent = letters.toUpperCase();
          $("ww-word-input").value = "";
          $("ww-submit").disabled = false;
          showScreen("ww-play");
          timerId = setInterval(function () {
            timeLeft--;
            $("ww-timer").textContent = String(Math.max(0, timeLeft));
            if (timeLeft <= 0) {
              clearTimer();
              onTimeout();
            }
          }, 1000);
        }

        function onTimeout() {
          clearTimer();
          var loss = isSkull ? Math.min(2, players[currentIndex].lives) : 1;
          players[currentIndex].lives -= loss;
          if (players[currentIndex].lives < 0) players[currentIndex].lives = 0;
          turnCount++;
          if (aliveCount() <= 1) {
            showWin();
            return;
          }
          currentIndex = nextAliveAfter(currentIndex);
          showPassStart();
        }

        function showWin() {
          var alive = aliveIndices();
          if (alive.length === 1) {
            $("ww-winner-name").textContent = players[alive[0]].name.toUpperCase();
          } else {
            $("ww-winner-name").textContent = "GAME OVER";
          }
          showScreen("ww-over");
        }

        function advanceSuccess() {
          clearTimer();
          turnCount++;
          currentIndex = nextAliveAfter(currentIndex);
          showPassStart();
        }

        $("ww-count-next").addEventListener("click", function () {
          var n = parseInt($("ww-player-count").value, 10);
          if (!Number.isFinite(n) || n < 2) {
            alert("Need at least 2 players.");
            return;
          }
          buildNameFields(n);
          showScreen("ww-names");
        });

        $("ww-names-next").addEventListener("click", function () {
          var list = readNamesStrings();
          if (!list) return;
          players = list.map(function (name) {
            return { name: name, lives: 3 };
          });
          showScreen("ww-rules");
        });

        $("ww-rules-next").addEventListener("click", function () {
          usedWords = new Set();
          dictCache = new Map();
          turnCount = 0;
          currentIndex = 0;
          timerMaxStart = 45;
          showPassStart();
        });

        $("ww-pass-start-btn").addEventListener("click", startTurn);

        $("ww-submit").addEventListener("click", function () {
          var raw = $("ww-word-input").value;
          var w = norm(raw);
          if (!w) {
            alert("Type a word.");
            penalizeWrongSubmit();
            return;
          }
          if (usedWords.has(w)) {
            alert("That word was already used this game.");
            penalizeWrongSubmit();
            return;
          }
          if (!lettersInOrder(w, letters)) {
            alert('Your word must include the letters "' + letters.toUpperCase() + '" in order.');
            penalizeWrongSubmit();
            return;
          }
          $("ww-submit").disabled = true;
          validateDictionary(w).then(function (ok) {
            $("ww-submit").disabled = false;
            if (!ok) {
              alert("We couldn’t verify that word in the dictionary. Try another.");
              penalizeWrongSubmit();
              return;
            }
            usedWords.add(w);
            advanceSuccess();
          });
        });

        $("ww-word-input").addEventListener("keydown", function (e) {
          if (e.key === "Enter") $("ww-submit").click();
        });
      })();
    </script>
  </body>
</html>
