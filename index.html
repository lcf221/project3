<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Line Laughs</title>
    <link rel="stylesheet" href="https://use.typekit.net/mdc7iyl.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <section id="splash" class="screen active" aria-label="Welcome" role="button" tabindex="0">
        <h1 class="splash-title">Line Laughs</h1>
        <p class="splash-hint">Tap to continue</p>
      </section>

      <section id="line-time" class="screen" aria-label="Line wait time">
        <div>
          <p class="line-time-prompt">How long is your line?</p>
          <div class="line-time-input-wrap">
            <label class="visually-hidden" for="minutes-input">Minutes</label>
            <input
              id="minutes-input"
              class="line-time-input"
              type="number"
              inputmode="numeric"
              min="1"
              max="999"
              placeholder="Minutes…"
              autocomplete="off"
            />
          </div>
          <div class="line-time-actions">
            <button type="button" class="btn-primary" id="line-time-submit" disabled>
              Continue
            </button>
          </div>
        </div>
        <div class="coaster-wrap coaster-root" aria-hidden="true" data-coaster-mode="idle">
          <svg class="coaster-svg" viewBox="0 0 400 118" xmlns="http://www.w3.org/2000/svg">
            <line
              class="coaster-ground-line"
              x1="0"
              y1="104"
              x2="400"
              y2="104"
              fill="none"
              stroke="currentColor"
              stroke-width="1.25"
              stroke-opacity="0.35"
              stroke-linecap="round"
            />
            <g class="coaster-supports" fill="none" stroke="currentColor" stroke-linecap="round"></g>
            <path
              class="coaster-rail-path"
              fill="none"
              stroke="currentColor"
              stroke-width="8"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M 6 99 C 28 99 38 76 55 70 C 72 64 88 92 108 100 C 128 108 145 78 168 54 C 192 32 208 44 228 78 C 246 100 260 92 278 50 C 298 18 318 16 342 52 C 364 82 382 88 395 90"
            />
            <g class="coaster-car" transform="translate(6,99)">
              <g class="coaster-car-body">
                <rect x="-11" y="-12" width="22" height="11" rx="2" fill="currentColor" />
                <circle cx="-4.5" cy="2" r="3.25" fill="currentColor" />
                <circle cx="5.5" cy="2" r="3.25" fill="currentColor" />
              </g>
            </g>
          </svg>
        </div>
      </section>

      <section id="games" class="screen" aria-label="Choose a game">
        <h2 class="games-heading">Choose your game</h2>
        <div class="games-grid" role="group" aria-label="Games">
          <a href="fishbowl.html" class="game-tile" data-game="fishbowl">Fishbowl</a>
          <a href="imposter.html" class="game-tile" data-game="imposter">Imposter</a>
          <a href="trivia.html" class="game-tile" data-game="trivia">Trivia</a>
          <a href="telestrations.html" class="game-tile" data-game="telestrations">Telestrations</a>
          <a href="conversation.html" class="game-tile" data-game="conversation">Conversation topics</a>
          <a href="wild-words.html" class="game-tile" data-game="wild-words">Wild Words</a>
        </div>
        <div class="coaster-wrap coaster-root" aria-hidden="true" data-coaster-mode="timer">
          <svg class="coaster-svg" viewBox="0 0 400 118" xmlns="http://www.w3.org/2000/svg">
            <line
              class="coaster-ground-line"
              x1="0"
              y1="104"
              x2="400"
              y2="104"
              fill="none"
              stroke="currentColor"
              stroke-width="1.25"
              stroke-opacity="0.35"
              stroke-linecap="round"
            />
            <g class="coaster-supports" fill="none" stroke="currentColor" stroke-linecap="round"></g>
            <path
              class="coaster-rail-path"
              fill="none"
              stroke="currentColor"
              stroke-width="8"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M 6 99 C 28 99 38 76 55 70 C 72 64 88 92 108 100 C 128 108 145 78 168 54 C 192 32 208 44 228 78 C 246 100 260 92 278 50 C 298 18 318 16 342 52 C 364 82 382 88 395 90"
            />
            <g class="coaster-car" transform="translate(6,99)">
              <g class="coaster-car-body">
                <rect x="-11" y="-12" width="22" height="11" rx="2" fill="currentColor" />
                <circle cx="-4.5" cy="2" r="3.25" fill="currentColor" />
                <circle cx="5.5" cy="2" r="3.25" fill="currentColor" />
              </g>
            </g>
          </svg>
        </div>
      </section>
    </div>

    <nav id="bottom-nav" class="bottom-nav" aria-label="Main">
      <button type="button" id="nav-home">Home</button>
      <button type="button" id="nav-new-game">New game</button>
      <button type="button" id="nav-new-category">New category</button>
      <span class="nav-timer" id="nav-timer" role="status" aria-live="polite">—:—</span>
    </nav>

    <script>
      (function () {
        var splash = document.getElementById("splash");
        var lineTime = document.getElementById("line-time");
        var games = document.getElementById("games");
        var bottomNav = document.getElementById("bottom-nav");
        var minutesInput = document.getElementById("minutes-input");
        var lineTimeSubmit = document.getElementById("line-time-submit");
        var navHome = document.getElementById("nav-home");
        var navNewGame = document.getElementById("nav-new-game");
        var navNewCategory = document.getElementById("nav-new-category");
        var navTimer = document.getElementById("nav-timer");

        var totalSeconds = 0;
        var remainingSeconds = 0;
        var timerId = null;
        var lineEndTime = 0;
        var lineComplete = false;

        function showScreen(el) {
          [splash, lineTime, games].forEach(function (s) {
            s.classList.toggle("active", s === el);
          });
          var navOn = bottomNav.classList.contains("visible");
          games.classList.toggle("with-bottom-nav", el === games && navOn);
        }

        function formatTime(sec) {
          if (sec <= 0) return "0:00";
          var m = Math.floor(sec / 60);
          var s = sec % 60;
          return m + ":" + (s < 10 ? "0" : "") + s;
        }

        function updateTimerLabel() {
          navTimer.textContent = formatTime(remainingSeconds) + " left";
        }

        function stopTimer(resetLine) {
          if (timerId) {
            clearInterval(timerId);
            timerId = null;
          }
          if (resetLine !== false) {
            lineEndTime = 0;
            lineComplete = false;
            sessionStorage.removeItem("line-laughs-line-end");
            sessionStorage.removeItem("line-laughs-total-sec");
          }
        }

        function persistLineTimer() {
          if (lineEndTime > 0 && totalSeconds > 0) {
            sessionStorage.setItem("line-laughs-line-end", String(lineEndTime));
            sessionStorage.setItem("line-laughs-total-sec", String(totalSeconds));
          }
        }

        function syncLineFromClock() {
          if (totalSeconds <= 0) return;
          if (lineEndTime <= 0 && !lineComplete) return;
          var now = Date.now();
          var rem = Math.max(0, Math.ceil((lineEndTime - now) / 1000));
          if (rem !== remainingSeconds) {
            remainingSeconds = rem;
            updateTimerLabel();
          }
          updateCoasters();
          persistLineTimer();
          if (rem <= 0) {
            remainingSeconds = 0;
            lineComplete = true;
            updateTimerLabel();
            stopTimer(false);
            persistLineTimer();
            updateCoasters();
          }
        }

        function startTimer() {
          stopTimer(true);
          lineEndTime = Date.now() + totalSeconds * 1000;
          remainingSeconds = totalSeconds;
          persistLineTimer();
          updateTimerLabel();
          syncLineFromClock();
          timerId = setInterval(syncLineFromClock, 200);
        }

        function coasterProgress() {
          if (lineComplete) return 1;
          if (totalSeconds <= 0 || lineEndTime <= 0) return 0;
          var t = 1 - (lineEndTime - Date.now()) / (totalSeconds * 1000);
          return Math.min(1, Math.max(0, t));
        }

        function pointOnRailAtX(rail, targetX) {
          var len = rail.getTotalLength();
          if (!len) return { x: targetX, y: 0 };
          var lo = 0;
          var hi = len;
          var i;
          for (i = 0; i < 48; i += 1) {
            var mid = (lo + hi) / 2;
            var p = rail.getPointAtLength(mid);
            if (p.x < targetX) lo = mid;
            else hi = mid;
          }
          return rail.getPointAtLength((lo + hi) / 2);
        }

        function buildCoasterSupports() {
          var groundY = 104;
          document.querySelectorAll(".coaster-root").forEach(function (root) {
            var rail = root.querySelector(".coaster-rail-path");
            var group = root.querySelector(".coaster-supports");
            if (!rail || !group || group.getAttribute("data-supports-ok") === "1") return;
            if (!rail.getTotalLength()) return;
            var x;
            for (x = 20; x <= 380; x += 28) {
              var p = pointOnRailAtX(rail, x);
              var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
              line.setAttribute("x1", p.x);
              line.setAttribute("y1", p.y);
              line.setAttribute("x2", p.x);
              line.setAttribute("y2", groundY);
              line.setAttribute("stroke-width", "2.5");
              group.appendChild(line);
            }
            group.setAttribute("data-supports-ok", "1");
          });
        }

        function updateCoasters() {
          var pTimer = coasterProgress();
          document.querySelectorAll(".coaster-root").forEach(function (root) {
            var mode = root.getAttribute("data-coaster-mode");
            var progress = mode === "timer" ? pTimer : 0;
            var rail = root.querySelector(".coaster-rail-path");
            var car = root.querySelector(".coaster-car");
            var body = root.querySelector(".coaster-car-body");
            if (!rail || !car) return;
            var len = rail.getTotalLength();
            if (!len) return;
            var dist = progress * len;
            var pt = rail.getPointAtLength(dist);
            var ahead = Math.min(dist + 4, len);
            var pt2 = rail.getPointAtLength(ahead);
            var ang = (Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * 180) / Math.PI;
            var lift = 9;
            car.setAttribute(
              "transform",
              "translate(" + pt.x + "," + pt.y + ") rotate(" + ang + ") translate(0," + -lift + ")"
            );
            if (body) {
              var bobSec;
              if (mode === "idle") {
                bobSec = 2.5;
              } else if (lineComplete) {
                bobSec = 2.85;
              } else if (totalSeconds > 0 && lineEndTime > 0) {
                var fracRem = Math.max(0, (lineEndTime - Date.now()) / (totalSeconds * 1000));
                bobSec = Math.max(0.42, 0.48 + fracRem * 2.35);
              } else {
                bobSec = 2.2;
              }
              body.style.animationDuration = bobSec + "s";
            }
          });
        }

        function setBottomNavVisible(on) {
          bottomNav.classList.toggle("visible", on);
          if (games.classList.contains("active")) {
            games.classList.toggle("with-bottom-nav", on);
          }
        }

        function goSplash() {
          stopTimer(true);
          setBottomNavVisible(false);
          showScreen(splash);
          updateCoasters();
        }

        function goLineTime() {
          setBottomNavVisible(false);
          showScreen(lineTime);
          minutesInput.focus();
          updateCoasters();
          requestAnimationFrame(function () {
            buildCoasterSupports();
            updateCoasters();
          });
        }

        function goGames() {
          setBottomNavVisible(true);
          showScreen(games);
          updateCoasters();
          requestAnimationFrame(function () {
            buildCoasterSupports();
            updateCoasters();
          });
        }

        function syncSubmitEnabled() {
          var v = parseInt(minutesInput.value, 10);
          lineTimeSubmit.disabled = !(Number.isFinite(v) && v > 0);
        }

        function advanceFromSplash() {
          goLineTime();
        }

        splash.addEventListener("click", advanceFromSplash);
        splash.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            advanceFromSplash();
          }
        });

        minutesInput.addEventListener("input", syncSubmitEnabled);

        lineTimeSubmit.addEventListener("click", function () {
          var v = parseInt(minutesInput.value, 10);
          if (!Number.isFinite(v) || v <= 0) return;
          totalSeconds = Math.min(v, 999) * 60;
          goGames();
          startTimer();
        });

        navHome.addEventListener("click", goSplash);

        navNewGame.addEventListener("click", function () {
          goGames();
          if (totalSeconds > 0) startTimer();
          else {
            updateTimerLabel();
            updateCoasters();
          }
        });

        navNewCategory.addEventListener("click", function () {
          window.location.href = "choose-game.html";
        });

        syncSubmitEnabled();
        updateTimerLabel();
        buildCoasterSupports();
        updateCoasters();
        requestAnimationFrame(function () {
          buildCoasterSupports();
          updateCoasters();
        });
      })();
    </script>
  </body>
</html>
