<!DOCTYPE html>
<html lang="en" class="tk-mokoko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#98cfe9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Line Laughs" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="apple-touch-icon" href="assets/game_icons/fishbowl.jpg" />
    <title>Line Laughs</title>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://p.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/mdc7iyl.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <section id="splash" class="screen active" aria-label="Welcome" role="button" tabindex="0"></section>

      <section id="line-time" class="screen line-time-screen" aria-label="Line wait time">
        <div class="line-time-stack">
          <div class="line-time-input-wrap">
            <label class="visually-hidden" for="minutes-input">Minutes</label>
            <input
              id="minutes-input"
              class="line-time-input"
              type="text"
              inputmode="numeric"
              maxlength="3"
              placeholder="minutes"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <div class="line-time-actions">
            <button type="button" class="btn-primary" id="line-time-submit" disabled>
              Continue
            </button>
          </div>
        </div>
      </section>

      <section id="games" class="screen" aria-label="Choose a game">
        <h2 class="games-heading">Line Laughs</h2>
        <div class="games-grid" role="group" aria-label="Games">
          <a href="fishbowl.html" class="game-tile" data-game="fishbowl" aria-label="Fishbowl">
            <img class="game-tile__icon" src="assets/game_icons/fishbowl.jpg" alt="" width="512" height="512" decoding="async" />
          </a>
          <a href="imposter.html" class="game-tile" data-game="imposter" aria-label="Imposter">
            <img class="game-tile__icon" src="assets/game_icons/imposter.jpg" alt="" width="512" height="512" decoding="async" />
          </a>
          <a href="trivia.html" class="game-tile" data-game="trivia" aria-label="Smarty Party">
            <img class="game-tile__icon" src="assets/game_icons/party.jpg" alt="" width="512" height="512" decoding="async" />
          </a>
          <a href="telestrations.html" class="game-tile" data-game="telestrations" aria-label="Silly Sketch">
            <img class="game-tile__icon" src="assets/game_icons/sketch.jpg" alt="" width="512" height="512" decoding="async" />
          </a>
          <a href="conversation.html" class="game-tile" data-game="conversation" aria-label="Spill the Beans">
            <img class="game-tile__icon" src="assets/game_icons/beans.jpg" alt="" width="512" height="512" decoding="async" />
          </a>
          <a href="wild-words.html" class="game-tile" data-game="wild-words" aria-label="Wild Words">
            <img class="game-tile__icon" src="assets/game_icons/words.jpg" alt="" width="512" height="512" decoding="async" />
          </a>
        </div>
        <div class="coaster-wrap coaster-root" aria-hidden="true" data-coaster-mode="timer">
          <svg class="coaster-svg" viewBox="0 0 400 112" xmlns="http://www.w3.org/2000/svg">
            <g class="coaster-supports" fill="none" stroke-linecap="round"></g>
            <path
              class="coaster-rail-path"
              fill="none"
              stroke-width="8"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M 6 99 C 28 99 38 76 55 70 C 72 64 88 92 108 100 C 128 108 145 78 168 54 C 192 32 208 44 228 78 C 246 100 260 92 278 50 C 298 18 318 16 342 52 C 364 82 382 88 395 90"
            />
            <g class="coaster-car" transform="translate(6,99)">
              <g class="coaster-car-body">
                <rect x="-11" y="-12" width="22" height="11" rx="2" fill="currentColor" />
                <circle cx="-4.5" cy="2" r="3.25" fill="currentColor" />
                <circle cx="5.5" cy="2" r="3.25" fill="currentColor" />
              </g>
            </g>
          </svg>
        </div>
      </section>
    </div>

    <nav id="bottom-nav" class="bottom-nav" aria-label="Main">
      <a href="index.html" class="bottom-nav-icon" aria-label="Line Laughs home">
        <img src="assets/navigation/Home.png" alt="" width="56" height="56" decoding="async" />
      </a>
      <a href="choose-game.html" class="bottom-nav-icon" aria-label="Pick a game">
        <img src="assets/navigation/new%20game.png" alt="" width="56" height="56" decoding="async" />
      </a>
      <a href="index.html" class="bottom-nav-icon" aria-label="Start over from Line Laughs">
        <img src="assets/navigation/restart.png" alt="" width="56" height="56" decoding="async" />
      </a>
      <div class="nav-timer-block" role="status" aria-live="polite">
        <img
          class="nav-timer__icon"
          src="assets/navigation/timer.png"
          alt=""
          width="48"
          height="48"
          decoding="async"
          aria-hidden="true"
        />
        <span class="nav-timer" id="nav-timer">—:—</span>
      </div>
    </nav>

    <script>
      (function () {
        var splash = document.getElementById("splash");
        var lineTime = document.getElementById("line-time");
        var games = document.getElementById("games");
        var bottomNav = document.getElementById("bottom-nav");
        var minutesInput = document.getElementById("minutes-input");
        var lineTimeSubmit = document.getElementById("line-time-submit");
        var navTimer = document.getElementById("nav-timer");

        var totalSeconds = 0;
        var remainingSeconds = 0;
        var timerId = null;
        var lineEndTime = 0;
        var lineComplete = false;

        function showScreen(el) {
          [splash, lineTime, games].forEach(function (s) {
            s.classList.toggle("active", s === el);
          });
          var navOn = bottomNav.classList.contains("visible");
          games.classList.toggle("with-bottom-nav", el === games && navOn);
        }

        function formatTime(sec) {
          if (sec <= 0) return "0:00";
          var m = Math.floor(sec / 60);
          var s = sec % 60;
          return m + ":" + (s < 10 ? "0" : "") + s;
        }

        function updateTimerLabel() {
          navTimer.textContent = formatTime(remainingSeconds);
        }

        function stopTimer(resetLine) {
          if (timerId) {
            clearInterval(timerId);
            timerId = null;
          }
          if (resetLine !== false) {
            lineEndTime = 0;
            lineComplete = false;
            sessionStorage.removeItem("line-laughs-line-end");
            sessionStorage.removeItem("line-laughs-total-sec");
          }
        }

        function persistLineTimer() {
          if (lineEndTime > 0 && totalSeconds > 0) {
            sessionStorage.setItem("line-laughs-line-end", String(lineEndTime));
            sessionStorage.setItem("line-laughs-total-sec", String(totalSeconds));
          }
        }

        function syncLineFromClock() {
          if (totalSeconds <= 0) return;
          if (lineEndTime <= 0 && !lineComplete) return;
          var now = Date.now();
          var rem = Math.max(0, Math.ceil((lineEndTime - now) / 1000));
          if (rem !== remainingSeconds) {
            remainingSeconds = rem;
            updateTimerLabel();
          }
          updateCoasters();
          persistLineTimer();
          if (rem <= 0) {
            remainingSeconds = 0;
            lineComplete = true;
            updateTimerLabel();
            stopTimer(false);
            persistLineTimer();
            updateCoasters();
          }
        }

        function startTimer() {
          stopTimer(true);
          lineEndTime = Date.now() + totalSeconds * 1000;
          remainingSeconds = totalSeconds;
          persistLineTimer();
          updateTimerLabel();
          syncLineFromClock();
          timerId = setInterval(syncLineFromClock, 200);
        }

        function coasterProgress() {
          if (lineComplete) return 1;
          if (totalSeconds <= 0 || lineEndTime <= 0) return 0;
          var t = 1 - (lineEndTime - Date.now()) / (totalSeconds * 1000);
          return Math.min(1, Math.max(0, t));
        }

        function pointOnRailAtX(rail, targetX) {
          var len = rail.getTotalLength();
          if (!len) return { x: targetX, y: 0 };
          var lo = 0;
          var hi = len;
          var i;
          for (i = 0; i < 48; i += 1) {
            var mid = (lo + hi) / 2;
            var p = rail.getPointAtLength(mid);
            if (p.x < targetX) lo = mid;
            else hi = mid;
          }
          return rail.getPointAtLength((lo + hi) / 2);
        }

        function buildCoasterSupports() {
          var groundY = 104;
          var supportColors = ["#7fd6ff", "#b2d16d", "#ffa500"];
          document.querySelectorAll(".coaster-root").forEach(function (root) {
            var rail = root.querySelector(".coaster-rail-path");
            var group = root.querySelector(".coaster-supports");
            if (!rail || !group || group.getAttribute("data-supports-ok") === "1") return;
            if (!rail.getTotalLength()) return;
            var x;
            var idx = 0;
            for (x = 20; x <= 380; x += 28) {
              var p = pointOnRailAtX(rail, x);
              var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
              line.setAttribute("x1", p.x);
              line.setAttribute("y1", p.y);
              line.setAttribute("x2", p.x);
              line.setAttribute("y2", groundY);
              line.setAttribute("stroke-width", "8");
              line.setAttribute("stroke", supportColors[idx % 3]);
              line.setAttribute("stroke-opacity", "0.92");
              group.appendChild(line);
              idx += 1;
            }
            group.setAttribute("data-supports-ok", "1");
          });
        }

        function updateCoasters() {
          var pTimer = coasterProgress();
          document.querySelectorAll(".coaster-root").forEach(function (root) {
            var mode = root.getAttribute("data-coaster-mode");
            var progress = mode === "timer" ? pTimer : 0;
            var rail = root.querySelector(".coaster-rail-path");
            var car = root.querySelector(".coaster-car");
            var body = root.querySelector(".coaster-car-body");
            if (!rail || !car) return;
            var len = rail.getTotalLength();
            if (!len) return;
            var dist = progress * len;
            var pt = rail.getPointAtLength(dist);
            var ahead = Math.min(dist + 4, len);
            var pt2 = rail.getPointAtLength(ahead);
            var ang = (Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * 180) / Math.PI;
            var lift = 9;
            car.setAttribute(
              "transform",
              "translate(" + pt.x + "," + pt.y + ") rotate(" + ang + ") translate(0," + -lift + ")"
            );
            if (body) {
              var bobSec;
              if (mode === "idle") {
                bobSec = 2.5;
              } else if (lineComplete) {
                bobSec = 2.85;
              } else if (totalSeconds > 0 && lineEndTime > 0) {
                var fracRem = Math.max(0, (lineEndTime - Date.now()) / (totalSeconds * 1000));
                bobSec = Math.max(0.42, 0.48 + fracRem * 2.35);
              } else {
                bobSec = 2.2;
              }
              body.style.animationDuration = bobSec + "s";
            }
          });
        }

        function setBottomNavVisible(on) {
          bottomNav.classList.toggle("visible", on);
          if (games.classList.contains("active")) {
            games.classList.toggle("with-bottom-nav", on);
          }
        }

        function goSplash() {
          stopTimer(true);
          setBottomNavVisible(false);
          showScreen(splash);
          updateCoasters();
        }

        function goLineTime() {
          setBottomNavVisible(false);
          showScreen(lineTime);
          minutesInput.focus();
          updateCoasters();
          requestAnimationFrame(function () {
            buildCoasterSupports();
            updateCoasters();
          });
        }

        function goGames() {
          setBottomNavVisible(true);
          showScreen(games);
          updateCoasters();
          requestAnimationFrame(function () {
            buildCoasterSupports();
            updateCoasters();
          });
        }

        function lineTimeMinutesValue() {
          var digits = String(minutesInput.value).replace(/\D/g, "");
          var v = parseInt(digits, 10);
          return Number.isFinite(v) ? v : NaN;
        }

        function syncSubmitEnabled() {
          var v = lineTimeMinutesValue();
          lineTimeSubmit.disabled = !(Number.isFinite(v) && v > 0 && v <= 999);
        }

        function advanceFromSplash() {
          goLineTime();
        }

        splash.addEventListener("click", advanceFromSplash);
        splash.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            advanceFromSplash();
          }
        });

        minutesInput.addEventListener("input", function () {
          var d = String(minutesInput.value).replace(/\D/g, "").slice(0, 3);
          if (minutesInput.value !== d) minutesInput.value = d;
          syncSubmitEnabled();
        });

        lineTimeSubmit.addEventListener("click", function () {
          var v = lineTimeMinutesValue();
          if (!Number.isFinite(v) || v <= 0) return;
          totalSeconds = Math.min(v, 999) * 60;
          goGames();
          startTimer();
        });

        syncSubmitEnabled();
        updateTimerLabel();
        buildCoasterSupports();
        updateCoasters();
        requestAnimationFrame(function () {
          buildCoasterSupports();
          updateCoasters();
        });
      })();
    </script>
  </body>
</html>
