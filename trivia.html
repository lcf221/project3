<!DOCTYPE html>
<html lang="en" class="tk-mokoko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#98cfe9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Line Laughs" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="apple-touch-icon" href="assets/game_icons/fishbowl.jpg" />
    <title>Smarty Party — Line Laughs</title>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://p.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/mdc7iyl.css" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="fishbowl.css" />
    <link rel="stylesheet" href="trivia.css" />
    <link rel="stylesheet" href="pass-to-player.css" />
  </head>
  <body class="trivia-body">
    <div id="app" class="trivia-app">
      <section
        id="game-brand-splash"
        class="fb-screen fb-splash game-splash-full active"
        data-next="tr-count"
        data-splash-autoadvance="3000"
        role="button"
        aria-label="Smarty Party, tap or wait a few seconds to start"
        tabindex="0"
      >
        <img
          class="game-splash-full__img"
          src="assets/gamesplash/smartyparty.png"
          alt=""
          width="1170"
          height="2532"
          decoding="async"
        />
      </section>

      <section id="tr-count" class="fb-screen fb-screen--water" aria-label="Player count">
        <div class="fb-fishbowl-ui fb-fishbowl-ui--count">
          <p class="fb-fb-sub">2+ PLAYERS</p>
          <h2 class="fb-fb-h1">HOW MANY PLAYERS?</h2>
          <input
            id="tr-player-count"
            class="fb-dark-field"
            type="number"
            inputmode="numeric"
            min="2"
            max="24"
            placeholder="TYPE HERE"
            aria-label="How many players"
            autocomplete="off"
          />
          <button type="button" class="fb-orange-btn" id="tr-count-next">SUBMIT</button>
        </div>
        <div class="fb-char-grid-9" aria-hidden="true">
          <img src="assets/smarty%20party/Smarty_Party.svg" alt="" width="200" height="200" />
          <img src="assets/smarty%20party/Smarty_Party%202.svg" alt="" width="200" height="200" />
          <img src="assets/smarty%20party/Smarty_Party%203.svg" alt="" width="200" height="200" />
          <img src="assets/smarty%20party/Smarty_Party%204.svg" alt="" width="200" height="200" />
          <img src="assets/smarty%20party/Smarty_Party%205.svg" alt="" width="200" height="200" />
          <img src="assets/smarty%20party/Smarty_Party%206.svg" alt="" width="200" height="200" />
          <img src="assets/smarty%20party/Smarty_Party%207.svg" alt="" width="200" height="200" />
          <img src="assets/smarty%20party/Smarty_Party%208.svg" alt="" width="200" height="200" />
          <img src="assets/smarty%20party/Smarty_Party%209.svg" alt="" width="200" height="200" />
        </div>
      </section>

      <section id="tr-names" class="fb-screen fb-screen--water" aria-label="Player names">
        <div class="fb-fishbowl-ui fb-fishbowl-ui--offset">
          <h2 class="fb-fb-h1">PLAYERS: PUT IN CIRCLE ORDER</h2>
          <div id="tr-names-fields" class="fb-names-fields"></div>
          <button type="button" class="fb-orange-btn" id="tr-names-next">SUBMIT</button>
        </div>
      </section>

      <section id="tr-rules" class="fb-screen fb-screen--water" aria-label="Rules">
        <div class="fb-fishbowl-ui fb-rules-stack">
          <h2 class="fb-fb-h1 fb-rules-title">RULES</h2>
          <ol class="fb-rules-ol">
            <li>EACH PLAYER RECEIVES THE SAME QUESTIONS.</li>
            <li>PLAYERS WILL ANSWER ONE AT A TIME!</li>
            <li>NO CHEATING!</li>
          </ol>
          <p class="fb-rules-question" id="tr-rules-question-line">HOW MANY QUESTIONS?</p>
          <input
            id="tr-num-questions"
            class="fb-dark-field"
            type="number"
            inputmode="numeric"
            min="1"
            max="40"
            value="5"
            placeholder="TYPE HERE"
            aria-labelledby="tr-rules-question-line"
            autocomplete="off"
          />
          <button type="button" class="fb-orange-btn" id="tr-rules-next">CONTINUE</button>
        </div>
      </section>

      <section id="tr-pass" class="fb-screen fb-screen--water ll-pass-to-player" aria-label="Pass phone">
        <div class="ll-pass-inner">
          <p class="ll-pass-eyebrow" id="tr-pass-kicker"></p>
          <p class="ll-pass-line tr-pass-heading">PASS THE PHONE TO:</p>
          <img id="tr-pass-char" class="ll-pass-hero" src="assets/smarty%20party/Smarty_Party.svg" alt="" width="200" height="200" decoding="async" />
          <p id="tr-pass-name" class="ll-pass-name"></p>
          <button type="button" class="fb-orange-btn" id="tr-pass-show">SHOW QUESTION</button>
        </div>
      </section>

      <section id="tr-play" class="fb-screen fb-screen--water" aria-label="Question">
        <div class="tr-play-inner">
          <p class="tr-play-q" id="tr-q-text"></p>
          <div id="tr-mc-btns" class="tr-mc-col" role="group" aria-label="Answer choices"></div>
          <p class="tr-play-feedback" id="tr-feedback" hidden></p>
          <button type="button" class="fb-orange-btn" id="tr-play-next" hidden>CONTINUE</button>
        </div>
      </section>

      <section id="tr-score" class="fb-screen fb-screen--water" aria-label="Scores">
        <div class="tr-score-inner">
          <h2 class="tr-score-title">SCORES</h2>
          <div id="tr-score-rows" class="tr-score-rows"></div>
          <button type="button" class="fb-orange-btn" id="tr-score-continue">CONTINUE</button>
        </div>
      </section>

      <section id="tr-results" class="fb-screen tr-win-screen" aria-label="Winner">
        <div class="tr-win-center">
          <p id="tr-winner-name" class="tr-winner-name"></p>
        </div>
      </section>
    </div>

    <nav class="bottom-nav visible" aria-label="Main">
      <a href="index.html" class="bottom-nav-icon" aria-label="Line Laughs home">
        <img src="assets/navigation/Home.png" alt="" width="56" height="56" decoding="async" />
      </a>
      <a href="choose-game.html" class="bottom-nav-icon" aria-label="Pick a game">
        <img src="assets/navigation/new%20game.png" alt="" width="56" height="56" decoding="async" />
      </a>
      <a href="trivia.html" class="bottom-nav-icon" aria-label="Restart Smarty Party">
        <img src="assets/navigation/restart.png" alt="" width="56" height="56" decoding="async" />
      </a>
      <div class="nav-timer-block" role="status" aria-live="polite">
        <img
          class="nav-timer__icon"
          src="assets/navigation/timer.png"
          alt=""
          width="48"
          height="48"
          decoding="async"
          aria-hidden="true"
        />
        <span class="nav-timer" id="nav-timer">—:—</span>
      </div>
    </nav>

    <script src="timer-nav.js"></script>
    <script src="game-brand.js"></script>
    <script>
      (function () {
        var QUESTIONS = [
          { q: "What is the capital of Mongolia?", o: ["Astana", "Ulaanbaatar", "Tashkent", "Bishkek"], c: 1 },
          { q: "Which element has atomic number 79?", o: ["Silver", "Gold", "Mercury", "Platinum"], c: 1 },
          { q: "In what year did the Berlin Wall fall?", o: ["1987", "1989", "1991", "1993"], c: 1 },
          { q: "Who composed The Four Seasons?", o: ["Bach", "Mozart", "Vivaldi", "Handel"], c: 2 },
          { q: "What is the derivative of x² with respect to x?", o: ["x", "2x", "x²", "2"], c: 1 },
          { q: "Which country has the most time zones (including territories)?", o: ["Russia", "USA", "France", "Canada"], c: 2 },
          { q: "What is the speed of light in vacuum (approx.)?", o: ["3×10⁶ m/s", "3×10⁸ m/s", "3×10¹⁰ m/s", "300 m/s"], c: 1 },
          { q: "The Peloponnesian War was fought between which city-states?", o: ["Athens & Sparta", "Rome & Carthage", "Thebes & Corinth", "Athens & Thebes"], c: 0 },
          { q: "What does HTTP stand for?", o: ["HyperText Transfer Protocol", "High Transfer Text Protocol", "Hyperlink Text Transport", "Host Text Transfer Process"], c: 0 },
          { q: "Which blood type is the universal donor (for red cells)?", o: ["A", "B", "AB", "O negative"], c: 3 },
          { q: "Who wrote Crime and Punishment?", o: ["Tolstoy", "Dostoevsky", "Chekhov", "Turgenev"], c: 1 },
          { q: "What is the largest moon of Saturn?", o: ["Europa", "Titan", "Ganymede", "Triton"], c: 1 },
          { q: "In DNA, which base pairs with guanine?", o: ["Adenine", "Thymine", "Cytosine", "Uracil"], c: 2 },
          { q: "What is 17²?", o: ["269", "289", "299", "279"], c: 1 },
          { q: "Which country was formerly known as Persia?", o: ["Iraq", "Iran", "Turkey", "Afghanistan"], c: 1 },
          { q: "What is the SI unit of electrical resistance?", o: ["Volt", "Ampere", "Ohm", "Watt"], c: 2 },
          { q: "Who painted The Starry Night?", o: ["Monet", "Van Gogh", "Cézanne", "Gauguin"], c: 1 },
          { q: "What is the hardest mineral on the Mohs scale?", o: ["Corundum", "Topaz", "Diamond", "Quartz"], c: 2 },
          { q: "Which treaty ended World War I for Germany?", o: ["Treaty of Paris", "Treaty of Versailles", "Treaty of Tordesillas", "Treaty of Ghent"], c: 1 },
          { q: "What is the capital of Kazakhstan?", o: ["Almaty", "Astana", "Tashkent", "Baku"], c: 1 },
          { q: "How many chromosomes do humans typically have?", o: ["23", "46", "44", "48"], c: 1 },
          { q: "Which gas do humans add most from burning fossil fuels, driving recent climate change?", o: ["Methane", "Nitrous oxide", "Carbon dioxide", "Ozone"], c: 2 },
          { q: "Who wrote 1984?", o: ["Huxley", "Orwell", "Bradbury", "Atwood"], c: 1 },
          { q: "What is the value of π (pi) to two decimal places?", o: ["3.12", "3.14", "3.16", "3.41"], c: 1 },
          { q: "Which ocean is the deepest trench (Mariana) in?", o: ["Atlantic", "Indian", "Arctic", "Pacific"], c: 3 },
          { q: "What is the term for animals active at dawn and dusk?", o: ["Nocturnal", "Diurnal", "Crepuscular", "Matutinal"], c: 2 },
          { q: "In which year did the Chernobyl disaster occur?", o: ["1984", "1986", "1988", "1990"], c: 1 },
          { q: "What is the smallest country in the world by area?", o: ["Monaco", "Vatican City", "San Marino", "Liechtenstein"], c: 1 },
          { q: "Which planet has the strongest magnetic field?", o: ["Earth", "Jupiter", "Saturn", "Neptune"], c: 1 },
          { q: "What does E=mc² mean the “c” represents?", o: ["Charge", "Speed of light", "Constant of gravity", "Capacitance"], c: 1 },
          { q: "Who wrote The Art of War?", o: ["Confucius", "Sun Tzu", "Lao Tzu", "Mencius"], c: 1 },
          { q: "What is the capital of Canada?", o: ["Toronto", "Montreal", "Ottawa", "Vancouver"], c: 2 },
          { q: "Which language family does Hungarian belong to?", o: ["Slavic", "Romance", "Uralic", "Germanic"], c: 2 },
          { q: "What is the powerhouse of the animal cell?", o: ["Nucleus", "Ribosome", "Mitochondria", "Golgi apparatus"], c: 2 },
          { q: "How many degrees in a full circle?", o: ["180", "270", "360", "400"], c: 2 },
          { q: "Which composer was deaf in his later years?", o: ["Mozart", "Beethoven", "Haydn", "Schubert"], c: 1 },
          { q: "What is the longest mountain range on Earth?", o: ["Himalayas", "Andes", "Rockies", "Alps"], c: 1 },
          { q: "In computing, what does CPU stand for?", o: ["Central Processing Unit", "Computer Personal Unit", "Core Program Utility", "Cached Processing Utility"], c: 0 },
          { q: "Which vitamin deficiency causes scurvy?", o: ["A", "B1", "C", "D"], c: 2 },
          { q: "What is the cube root of 27?", o: ["2", "3", "4", "9"], c: 1 },
          { q: "Who painted Guernica?", o: ["Dalí", "Picasso", "Miró", "Gris"], c: 1 },
          { q: "What is the capital of Australia?", o: ["Sydney", "Melbourne", "Canberra", "Brisbane"], c: 2 },
          { q: "Which particle has a negative charge?", o: ["Proton", "Neutron", "Electron", "Photon"], c: 2 },
          { q: "The Battle of Waterloo (1815) ended whose rule as French Emperor?", o: ["Louis XIV", "Napoleon", "Robespierre", "Louis Napoleon"], c: 1 },
          { q: "What is the largest desert that is mostly sand?", o: ["Gobi", "Sahara", "Kalahari", "Arabian"], c: 1 },
          { q: "Which Shakespeare play features Prospero and Caliban?", o: ["Hamlet", "The Tempest", "Macbeth", "King Lear"], c: 1 },
          { q: "What is log₁₀(100)?", o: ["1", "2", "10", "100"], c: 1 },
          { q: "Which country invented paper (traditionally credited)?", o: ["Egypt", "China", "India", "Greece"], c: 1 },
          { q: "What is the chemical formula for table salt?", o: ["NaCl", "KCl", "HCl", "CaCl₂"], c: 0 },
          { q: "How many symphonies did Beethoven complete?", o: ["7", "8", "9", "10"], c: 2 },
        ];

        var players = [];
        var scores = [];
        var numQuestions = 5;
        var deck = [];
        var qIndex = 0;
        var playerInQuestion = 0;
        var totalQ = 0;
        var answered = false;

        function $(id) {
          return document.getElementById(id);
        }

        function showScreen(id) {
          document.querySelectorAll(".fb-screen").forEach(function (el) {
            el.classList.toggle("active", el.id === id);
          });
        }

        function shuffle(arr) {
          var a = arr.slice();
          var i;
          for (i = a.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = a[i];
            a[i] = a[j];
            a[j] = t;
          }
          return a;
        }

        function smartyPartyCharSrc(i) {
          var n = (i % 9) + 1;
          if (n === 1) return "assets/smarty%20party/Smarty_Party.svg";
          return "assets/smarty%20party/Smarty_Party%20" + n + ".svg";
        }

        function buildNameFields(n) {
          var wrap = $("tr-names-fields");
          wrap.innerHTML = "";
          var i;
          for (i = 0; i < n; i++) {
            var row = document.createElement("div");
            row.className = "fb-name-row";
            var combo = document.createElement("div");
            combo.className = "fb-name-field-combo";
            var inp = document.createElement("input");
            inp.id = "tr-name-" + i;
            inp.className = "fb-dark-field fb-name-field";
            inp.type = "text";
            inp.autocomplete = "name";
            inp.placeholder = "TYPE HERE";
            var img = document.createElement("img");
            img.className = "fb-name-fish";
            img.src = smartyPartyCharSrc(i);
            img.alt = "";
            img.width = 200;
            img.height = 200;
            combo.appendChild(inp);
            combo.appendChild(img);
            row.appendChild(combo);
            wrap.appendChild(row);
          }
        }

        function readNames() {
          var fields = document.querySelectorAll("#tr-names-fields input.fb-name-field");
          var list = [];
          var i;
          for (i = 0; i < fields.length; i++) {
            var v = fields[i].value.trim();
            if (!v) {
              alert("Enter every name.");
              return null;
            }
            list.push(v);
          }
          return list;
        }

        function activePlayerName() {
          return players[playerInQuestion];
        }

        function buildDeck() {
          var pool = shuffle(QUESTIONS);
          deck = pool.slice(0, Math.min(numQuestions, pool.length));
          totalQ = deck.length;
          if (totalQ === 0) {
            alert("No questions available.");
            return false;
          }
          scores = players.map(function () {
            return 0;
          });
          qIndex = 0;
          playerInQuestion = 0;
          return true;
        }

        function showPass() {
          if (qIndex >= totalQ) {
            showResults();
            return;
          }
          $("tr-pass-kicker").textContent =
            "QUESTION " + (qIndex + 1) + " OF " + totalQ;
          $("tr-pass-char").src = smartyPartyCharSrc(playerInQuestion);
          $("tr-pass-name").textContent = activePlayerName().toUpperCase();
          showScreen("tr-pass");
        }

        function renderQuestion() {
          answered = false;
          var item = deck[qIndex];
          $("tr-q-text").textContent = item.q;
          $("tr-feedback").hidden = true;
          $("tr-feedback").textContent = "";
          $("tr-play-next").hidden = true;

          var grid = $("tr-mc-btns");
          grid.innerHTML = "";
          var i;
          for (i = 0; i < 4; i++) {
            (function (idx) {
              var btn = document.createElement("button");
              btn.type = "button";
              btn.className = "tr-mc-btn";
              btn.textContent = item.o[idx];
              btn.addEventListener("click", function () {
                onPick(idx);
              });
              grid.appendChild(btn);
            })(i);
          }
          showScreen("tr-play");
        }

        function onPick(choice) {
          if (answered) return;
          answered = true;
          var item = deck[qIndex];
          var correct = item.c === choice;
          if (correct) scores[playerInQuestion]++;

          var buttons = $("tr-mc-btns").querySelectorAll(".tr-mc-btn");
          var i;
          for (i = 0; i < 4; i++) {
            buttons[i].disabled = true;
            if (i === item.c) buttons[i].classList.add("is-correct");
            if (i === choice && i !== item.c) buttons[i].classList.add("is-wrong", "is-picked");
          }

          $("tr-feedback").hidden = false;
          $("tr-feedback").innerHTML = correct
            ? "<strong>Correct!</strong> +1 point"
            : "<strong>Not quite.</strong> The answer was: " + item.o[item.c];
          $("tr-play-next").hidden = false;
        }

        function showScoreUpdate() {
          var wrap = $("tr-score-rows");
          wrap.innerHTML = "";
          var i;
          for (i = 0; i < players.length; i++) {
            var row = document.createElement("div");
            row.className = "tr-score-row";
            var img = document.createElement("img");
            img.className = "tr-score-char";
            img.src = smartyPartyCharSrc(i);
            img.width = 72;
            img.height = 72;
            img.alt = "";
            var name = document.createElement("span");
            name.className = "tr-score-name";
            name.textContent = players[i];
            var num = document.createElement("span");
            num.className = "tr-score-num";
            num.textContent = String(scores[i]);
            row.appendChild(img);
            row.appendChild(name);
            row.appendChild(num);
            wrap.appendChild(row);
          }
          showScreen("tr-score");
        }

        function showResults() {
          var i;
          var best = -1;
          for (i = 0; i < players.length; i++) {
            if (scores[i] > best) best = scores[i];
          }
          var winners = [];
          for (i = 0; i < players.length; i++) {
            if (scores[i] === best) winners.push(players[i]);
          }
          $("tr-winner-name").textContent =
            winners.length === 1
              ? winners[0].toUpperCase()
              : winners
                  .map(function (n) {
                    return n.toUpperCase();
                  })
                  .join(" · ");
          showScreen("tr-results");
        }

        $("tr-count-next").addEventListener("click", function () {
          var n = parseInt($("tr-player-count").value, 10);
          if (!Number.isFinite(n) || n < 2) {
            alert("Need at least 2 players.");
            return;
          }
          buildNameFields(n);
          showScreen("tr-names");
        });

        $("tr-names-next").addEventListener("click", function () {
          var list = readNames();
          if (!list) return;
          players = list;
          showScreen("tr-rules");
        });

        $("tr-rules-next").addEventListener("click", function () {
          var nq = parseInt($("tr-num-questions").value, 10);
          if (!Number.isFinite(nq) || nq < 1) {
            alert("Enter how many questions (1 or more).");
            return;
          }
          numQuestions = nq;
          if (!buildDeck()) return;
          showPass();
        });

        $("tr-pass-show").addEventListener("click", renderQuestion);

        $("tr-play-next").addEventListener("click", function () {
          playerInQuestion++;
          if (playerInQuestion < players.length) {
            showPass();
          } else {
            showScoreUpdate();
          }
        });

        $("tr-score-continue").addEventListener("click", function () {
          playerInQuestion = 0;
          qIndex++;
          if (qIndex >= totalQ) {
            showResults();
          } else {
            showPass();
          }
        });
      })();
    </script>
  </body>
</html>
