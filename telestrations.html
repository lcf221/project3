<!DOCTYPE html>
<html lang="en" class="tk-mokoko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#98cfe9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Line Laughs" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="apple-touch-icon" href="assets/game_icons/fishbowl.jpg" />
    <title>Silly Sketch — Line Laughs</title>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://p.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/mdc7iyl.css" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="fishbowl.css" />
    <link rel="stylesheet" href="telestrations.css" />
    <link rel="stylesheet" href="pass-to-player.css" />
  </head>
  <body class="telestrations-body">
    <div id="app" class="telestrations-app">
      <section
        id="game-brand-splash"
        class="fb-screen fb-splash game-splash-full active"
        data-next="ts-count"
        data-splash-autoadvance="3000"
        role="button"
        aria-label="Silly Sketch, tap or wait a few seconds to start"
        tabindex="0"
      >
        <img
          class="game-splash-full__img"
          src="assets/gamesplash/sillysketch.png"
          alt=""
          width="1170"
          height="2532"
          decoding="async"
        />
      </section>

      <section id="ts-count" class="fb-screen fb-screen--water" aria-label="Player count">
        <div class="fb-fishbowl-ui fb-fishbowl-ui--count">
          <p class="fb-fb-sub">2+ PLAYERS</p>
          <h2 class="fb-fb-h1">HOW MANY PLAYERS?</h2>
          <input
            id="ts-player-count"
            class="fb-dark-field"
            type="number"
            inputmode="numeric"
            min="2"
            max="24"
            placeholder="TYPE HERE"
            aria-label="How many players"
            autocomplete="off"
          />
          <button type="button" class="fb-orange-btn" id="ts-count-next">SUBMIT</button>
        </div>
        <div class="fb-char-grid-9" aria-hidden="true">
          <img src="assets/silly_sketch/Silly_Sketch%201.svg" alt="" width="200" height="200" />
          <img src="assets/silly_sketch/Silly_Sketch%202.svg" alt="" width="200" height="200" />
          <img src="assets/silly_sketch/Silly_Sketch%203.svg" alt="" width="200" height="200" />
          <img src="assets/silly_sketch/Silly_Sketch%204.svg" alt="" width="200" height="200" />
          <img src="assets/silly_sketch/Silly_Sketch%205.svg" alt="" width="200" height="200" />
          <img src="assets/silly_sketch/Silly_Sketch%206.svg" alt="" width="200" height="200" />
          <img src="assets/silly_sketch/Silly_Sketch%207.svg" alt="" width="200" height="200" />
          <img src="assets/silly_sketch/Silly_Sketch%208.svg" alt="" width="200" height="200" />
          <img src="assets/silly_sketch/Silly_Sketch%209.svg" alt="" width="200" height="200" />
        </div>
      </section>

      <section id="ts-names" class="fb-screen fb-screen--water" aria-label="Player names">
        <div class="fb-fishbowl-ui fb-fishbowl-ui--offset">
          <h2 class="fb-fb-h1">PLAYERS: PUT IN CIRCLE ORDER</h2>
          <div id="ts-names-fields" class="fb-names-fields"></div>
          <button type="button" class="fb-orange-btn" id="ts-names-next">SUBMIT</button>
        </div>
      </section>

      <section id="ts-rules" class="fb-screen fb-screen--water" aria-label="Rules">
        <div class="fb-fishbowl-ui fb-rules-stack">
          <h2 class="fb-fb-h1 fb-rules-title">RULES</h2>
          <ol class="fb-rules-ol">
            <li>PICTIONARY TELEPHONE!</li>
            <li>DON’T SAY YOUR WORD OR GUESS OUT LOUD!</li>
            <li>60 SECONDS TO GET ARTSY!</li>
          </ol>
          <button type="button" class="fb-orange-btn" id="ts-rules-next">BEGIN</button>
        </div>
      </section>

      <section id="ts-pass" class="fb-screen fb-screen--water ll-pass-to-player" aria-label="Pass phone">
        <div class="ll-pass-inner">
          <p class="ll-pass-eyebrow" id="ts-pass-kicker" hidden></p>
          <p class="ll-pass-line">PASS THE PHONE TO:</p>
          <img id="ts-pass-char" class="ll-pass-hero" src="assets/silly_sketch/Silly_Sketch%201.svg" alt="" width="200" height="200" decoding="async" />
          <p id="ts-pass-name" class="ll-pass-name"></p>
          <p id="ts-pass-hint" class="ll-pass-note" aria-live="polite"></p>
          <button type="button" class="fb-orange-btn" id="ts-pass-go">START</button>
        </div>
      </section>

      <section id="ts-draw" class="fb-screen fb-screen--water ts-play-screen" aria-label="Draw">
        <div class="ts-play-inner">
          <div class="ts-timer-circle" id="ts-timer" role="timer" aria-live="polite">60</div>
          <p class="ts-draw-prompt" id="ts-draw-prompt"></p>
          <div class="ts-canvas-wrap">
            <canvas id="ts-canvas" aria-label="Drawing area"></canvas>
          </div>
          <div class="ts-dual-btns">
            <button type="button" class="fb-orange-btn ts-btn-half" id="ts-draw-undo">UNDO</button>
            <button type="button" class="fb-orange-btn ts-btn-half" id="ts-draw-done">DONE</button>
          </div>
        </div>
      </section>

      <section id="ts-guess" class="fb-screen fb-screen--water ts-play-screen" aria-label="Guess">
        <div class="ts-play-inner">
          <div class="ts-timer-circle" id="ts-guess-timer" role="timer" aria-live="polite">60</div>
          <p class="ts-guess-heading">GUESS:</p>
          <img id="ts-guess-img" class="ts-guess-preview" alt="Drawing to guess" />
          <input
            id="ts-guess-input"
            class="fb-dark-field ts-guess-input"
            type="text"
            autocomplete="off"
            autocapitalize="off"
            placeholder="TYPE HERE"
            aria-label="Your guess"
          />
          <div class="ts-dual-btns">
            <button type="button" class="fb-orange-btn ts-btn-half" id="ts-guess-undo">UNDO</button>
            <button type="button" class="fb-orange-btn ts-btn-half" id="ts-guess-done">DONE</button>
          </div>
        </div>
      </section>

      <section id="ts-reveal" class="fb-screen fb-screen--water" aria-label="The telephone">
        <div class="ts-telephone-wrap">
          <h2 class="ts-telephone-title" id="ts-telephone-heading">THE TELEPHONE</h2>
          <p class="ts-telephone-sub">The full chain from the original word to the end.</p>
          <div class="ts-telephone-scroll" id="ts-telephone-scroll" tabindex="0">
            <div class="ts-telephone-origin" id="ts-reveal-origin"></div>
            <div id="ts-reveal-chain" class="ts-reveal-chain ts-reveal-chain--inner"></div>
            <a href="telestrations.html" class="fb-orange-btn ts-telephone-again">PLAY AGAIN</a>
          </div>
        </div>
      </section>
    </div>

    <nav class="bottom-nav visible" aria-label="Main">
      <a href="index.html" class="bottom-nav-icon" aria-label="Line Laughs home">
        <img src="assets/navigation/Home.png" alt="" width="56" height="56" decoding="async" />
      </a>
      <a href="choose-game.html" class="bottom-nav-icon" aria-label="Pick a game">
        <img src="assets/navigation/new%20game.png" alt="" width="56" height="56" decoding="async" />
      </a>
      <a href="telestrations.html" class="bottom-nav-icon" aria-label="Restart Silly Sketch">
        <img src="assets/navigation/restart.png" alt="" width="56" height="56" decoding="async" />
      </a>
      <div class="nav-timer-block" role="status" aria-live="polite">
        <img
          class="nav-timer__icon"
          src="assets/navigation/timer.png"
          alt=""
          width="48"
          height="48"
          decoding="async"
          aria-hidden="true"
        />
        <span class="nav-timer" id="nav-timer">—:—</span>
      </div>
    </nav>

    <script src="timer-nav.js"></script>
    <script src="game-brand.js"></script>
    <script>
      (function () {
        var PROMPTS = [
          "Birthday cake",
          "Lightning",
          "Camping",
          "Robot",
          "Surfing",
          "Library",
          "Time machine",
          "Penguin",
          "Hot air balloon",
          "Zombie",
          "Pizza",
          "Rainbow",
          "Detective",
          "Volcano",
          "Skateboard",
          "Moon landing",
          "Haunted house",
          "Superhero",
          "Waterfall",
          "Karaoke",
          "Treasure map",
          "Jellyfish",
          "Roller coaster",
          "Wizard",
          "Sandcastle",
        ];

        var players = [];
        var seedWord = "";
        var chain = [];
        var stepIndex = 0;
        var tsPassPreamble = false;
        var timerId = null;
        var timeLeft = 60;
        var canvasCtx = null;
        var drawingDown = false;
        var lastPt = null;
        var strokeHadInk = false;
        var undoStack = [];
        var turnFinishing = false;
        var DRAW_SEC = 60;
        var GUESS_SEC = 60;

        function $(id) {
          return document.getElementById(id);
        }

        function escapeHtml(s) {
          var d = document.createElement("div");
          d.textContent = s;
          return d.innerHTML;
        }

        function showScreen(id) {
          document.querySelectorAll(".fb-screen").forEach(function (el) {
            el.classList.toggle("active", el.id === id);
          });
        }

        function clearTimer() {
          if (timerId) {
            clearInterval(timerId);
            timerId = null;
          }
        }

        function pickPrompt() {
          return PROMPTS[Math.floor(Math.random() * PROMPTS.length)];
        }

        function sillySketchCharSrc(i) {
          return "assets/silly_sketch/Silly_Sketch%20" + ((i % 9) + 1) + ".svg";
        }

        function buildNameFields(n) {
          var wrap = $("ts-names-fields");
          wrap.innerHTML = "";
          var i;
          for (i = 0; i < n; i++) {
            var row = document.createElement("div");
            row.className = "fb-name-row";
            var combo = document.createElement("div");
            combo.className = "fb-name-field-combo";
            var inp = document.createElement("input");
            inp.id = "ts-name-" + i;
            inp.className = "fb-dark-field fb-name-field";
            inp.type = "text";
            inp.autocomplete = "name";
            inp.placeholder = "TYPE HERE";
            var img = document.createElement("img");
            img.className = "fb-name-fish";
            img.src = sillySketchCharSrc(i);
            img.alt = "";
            img.width = 200;
            img.height = 200;
            combo.appendChild(inp);
            combo.appendChild(img);
            row.appendChild(combo);
            wrap.appendChild(row);
          }
        }

        function readNames() {
          var fields = document.querySelectorAll("#ts-names-fields input.fb-name-field");
          var list = [];
          var i;
          for (i = 0; i < fields.length; i++) {
            var v = fields[i].value.trim();
            if (!v) {
              alert("Enter every name.");
              return null;
            }
            list.push(v);
          }
          return list;
        }

        function totalSteps() {
          return players.length;
        }

        function isDrawStep() {
          return stepIndex % 2 === 0;
        }

        function setupCanvas() {
          var canvas = $("ts-canvas");
          var wrap = canvas.parentElement;
          var w = Math.min(wrap.clientWidth || 320, 340);
          var h = Math.floor(w * 0.62);
          canvas.width = w;
          canvas.height = h;
          canvasCtx = canvas.getContext("2d");
          canvasCtx.fillStyle = "#ffffff";
          canvasCtx.fillRect(0, 0, w, h);
          canvasCtx.lineWidth = 3;
          canvasCtx.lineCap = "round";
          canvasCtx.lineJoin = "round";
          canvasCtx.strokeStyle = "#0f1729";
          undoStack = [];
          undoStack.push(canvasCtx.getImageData(0, 0, w, h));
        }

        function pushCanvasState() {
          if (!canvasCtx) return;
          var canvas = $("ts-canvas");
          undoStack.push(canvasCtx.getImageData(0, 0, canvas.width, canvas.height));
        }

        function undoCanvas() {
          if (!canvasCtx || undoStack.length <= 1) return;
          undoStack.pop();
          var im = undoStack[undoStack.length - 1];
          canvasCtx.putImageData(im, 0, 0);
        }

        function canvasPoint(e) {
          var canvas = $("ts-canvas");
          var r = canvas.getBoundingClientRect();
          var x = (e.touches ? e.touches[0] : e).clientX - r.left;
          var y = (e.touches ? e.touches[0] : e).clientY - r.top;
          var sx = (x / r.width) * canvas.width;
          var sy = (y / r.height) * canvas.height;
          return { x: sx, y: sy };
        }

        function bindCanvasEvents() {
          var canvas = $("ts-canvas");
          function start(e) {
            e.preventDefault();
            drawingDown = true;
            strokeHadInk = false;
            lastPt = canvasPoint(e);
          }
          function move(e) {
            if (!drawingDown || !canvasCtx) return;
            e.preventDefault();
            var p = canvasPoint(e);
            canvasCtx.beginPath();
            canvasCtx.moveTo(lastPt.x, lastPt.y);
            canvasCtx.lineTo(p.x, p.y);
            canvasCtx.stroke();
            lastPt = p;
            strokeHadInk = true;
          }
          function end(e) {
            if (e) e.preventDefault();
            if (drawingDown && strokeHadInk) {
              pushCanvasState();
            }
            drawingDown = false;
            strokeHadInk = false;
            lastPt = null;
          }
          canvas.onmousedown = start;
          canvas.onmousemove = move;
          canvas.onmouseup = end;
          canvas.onmouseleave = end;
          canvas.ontouchstart = start;
          canvas.ontouchmove = move;
          canvas.ontouchend = end;
        }

        function startDrawTimer() {
          clearTimer();
          timeLeft = DRAW_SEC;
          $("ts-timer").textContent = String(timeLeft);
          timerId = setInterval(function () {
            timeLeft--;
            $("ts-timer").textContent = String(Math.max(0, timeLeft));
            if (timeLeft <= 0) {
              clearTimer();
              if ($("ts-draw").classList.contains("active")) {
                finishDraw();
              }
            }
          }, 1000);
        }

        function startGuessTimer() {
          clearTimer();
          timeLeft = GUESS_SEC;
          $("ts-guess-timer").textContent = String(timeLeft);
          timerId = setInterval(function () {
            timeLeft--;
            $("ts-guess-timer").textContent = String(Math.max(0, timeLeft));
            if (timeLeft <= 0) {
              clearTimer();
              if ($("ts-guess").classList.contains("active")) {
                if (!$("ts-guess-input").value.trim()) {
                  $("ts-guess-input").value = "?";
                }
                finishGuess();
              }
            }
          }, 1000);
        }

        function showPass() {
          tsPassPreamble = false;
          $("ts-pass-kicker").hidden = true;
          $("ts-pass-char").src = sillySketchCharSrc(stepIndex);
          $("ts-pass-name").textContent = String(players[stepIndex]).toUpperCase();
          if (isDrawStep()) {
            $("ts-pass-hint").textContent =
              stepIndex === 0
                ? "YOU’LL GET A RANDOM PROMPT, THEN DRAW IT IN 60 SECONDS."
                : "DRAW WHAT THE PREVIOUS PLAYER WROTE—DON’T PEEK AT EARLIER STEPS.";
          } else {
            $("ts-pass-hint").textContent = "LOOK AT THE LAST DRAWING ONLY— THEN WRITE WHAT YOU THINK IT IS.";
          }
          $("ts-pass-go").textContent = "START";
          showScreen("ts-pass");
        }

        function showDraw() {
          clearTimer();
          turnFinishing = false;
          var promptEl = $("ts-draw-prompt");
          if (stepIndex === 0) {
            promptEl.innerHTML = "DRAW: <strong>" + escapeHtml(seedWord.toUpperCase()) + "</strong>";
          } else {
            var prev = chain[stepIndex - 1];
            var phrase = prev && prev.text ? prev.text : "?";
            promptEl.innerHTML = "DRAW: <strong>" + escapeHtml(phrase.toUpperCase()) + "</strong>";
          }
          setupCanvas();
          bindCanvasEvents();
          startDrawTimer();
          showScreen("ts-draw");
        }

        function showGuess() {
          clearTimer();
          turnFinishing = false;
          var prev = chain[stepIndex - 1];
          $("ts-guess-img").src = prev && prev.dataUrl ? prev.dataUrl : "";
          $("ts-guess-input").value = "";
          startGuessTimer();
          showScreen("ts-guess");
          $("ts-guess-input").focus();
        }

        function advance() {
          stepIndex++;
          if (stepIndex >= totalSteps()) {
            showReveal();
          } else {
            showPass();
          }
        }

        function finishDraw() {
          if (turnFinishing) return;
          turnFinishing = true;
          clearTimer();
          var canvas = $("ts-canvas");
          var dataUrl = canvas.toDataURL("image/png");
          chain[stepIndex] = { type: "draw", dataUrl: dataUrl, by: players[stepIndex] };
          advance();
        }

        function finishGuess() {
          if (turnFinishing) return;
          var t = $("ts-guess-input").value.trim();
          if (!t) {
            alert("Type a guess—or a single ? if you’re stumped.");
            return;
          }
          turnFinishing = true;
          clearTimer();
          chain[stepIndex] = { type: "guess", text: t, by: players[stepIndex] };
          advance();
        }

        function showReveal() {
          $("ts-reveal-origin").innerHTML =
            '<p class="ts-telephone-block-label">ORIGINAL WORD</p><div class="ts-telephone-pill">' +
            escapeHtml(seedWord) +
            "</div>";
          var wrap = $("ts-reveal-chain");
          wrap.innerHTML = "";
          var i;
          for (i = 0; i < chain.length; i++) {
            var item = chain[i];
            var b = document.createElement("div");
            b.className = "ts-reveal-block";
            if (item.type === "draw") {
              b.innerHTML =
                '<p class="ts-telephone-block-label">' +
                escapeHtml(String(item.by).toUpperCase()) +
                ' DREW</p><div class="ts-telephone-drawing"><img class="ts-reveal-img" src="' +
                item.dataUrl +
                '" alt="" /></div>';
            } else {
              b.innerHTML =
                '<p class="ts-telephone-block-label">' +
                escapeHtml(String(item.by).toUpperCase()) +
                ' GUESSED</p><div class="ts-telephone-pill ts-telephone-pill--guess">' +
                escapeHtml(item.text) +
                "</div>";
            }
            wrap.appendChild(b);
          }
          var scrollEl = $("ts-telephone-scroll");
          if (scrollEl) scrollEl.scrollTop = 0;
          showScreen("ts-reveal");
        }

        $("ts-count-next").addEventListener("click", function () {
          var n = parseInt($("ts-player-count").value, 10);
          if (!Number.isFinite(n) || n < 2) {
            alert("Need at least 2 players.");
            return;
          }
          buildNameFields(n);
          showScreen("ts-names");
        });

        $("ts-names-next").addEventListener("click", function () {
          var list = readNames();
          if (!list) return;
          players = list;
          showScreen("ts-rules");
        });

        function showSillyPassStart() {
          tsPassPreamble = true;
          $("ts-pass-kicker").hidden = true;
          $("ts-pass-kicker").textContent = "";
          $("ts-pass-char").src = sillySketchCharSrc(0);
          $("ts-pass-name").textContent = String(players[0]).toUpperCase();
          $("ts-pass-hint").textContent = "";
          $("ts-pass-go").textContent = "START";
          showScreen("ts-pass");
        }

        $("ts-rules-next").addEventListener("click", function () {
          seedWord = pickPrompt();
          chain = [];
          stepIndex = 0;
          showSillyPassStart();
        });

        $("ts-pass-go").addEventListener("click", function () {
          if (tsPassPreamble) {
            tsPassPreamble = false;
            showDraw();
            return;
          }
          if (isDrawStep()) {
            showDraw();
          } else {
            showGuess();
          }
        });

        $("ts-draw-undo").addEventListener("click", function () {
          undoCanvas();
        });

        $("ts-draw-done").addEventListener("click", finishDraw);

        $("ts-guess-undo").addEventListener("click", function () {
          $("ts-guess-input").value = "";
        });

        $("ts-guess-done").addEventListener("click", finishGuess);

        $("ts-guess-input").addEventListener("keydown", function (e) {
          if (e.key === "Enter") finishGuess();
        });
      })();
    </script>
  </body>
</html>
